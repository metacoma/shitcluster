global:
  tolerations:
    - key: "node.longhorn.io/storage"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Equal"
      value: ""
      effect: "NoSchedule"

service:
  ui:
    type: LoadBalancer
    loadBalancerIP: 172.25.1.3

defaultSettings:
  createDefaultDiskLabeledNodes: true
  systemManagedComponentsNodeSelector: "storage:true"
  defaultDataPath: /storage
  defaultReplicaCount: "2"
  replicaSoftAntiAffinity: "true"
  allowVolumeCreationWithDegradedAvailability: "false"
  replicaAutoBalance: "least-effort"
  taintToleration: "node.longhorn.io/storage=true:NoSchedule,node-role.kubernetes.io/control-plane=:NoSchedule"

longhornUI:
  replicas: 1
  tolerations:
    - key: "node.longhorn.io/storage"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Equal"
      value: ""
      effect: "NoSchedule"
